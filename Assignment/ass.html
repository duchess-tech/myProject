<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .calcs {
            padding: 10px;

        }
    </style>
</head>

<body>
    <input class="calcs" id="a1" type="number" placeholder="firstnumber">
    <input class="calcs" id="a2" type="text"  placeholder="operator">
    <input class="calcs" id="a3" type="number" placeholder="secondnumber">
    <button type="button"  onclick="calcul()" class="btn bg-primary">calc</button>
    <h1 id="my"></h1>
   <a href="ass5.html"><span>signup</span></a>

</body>

</html>
<script>
 
    function calcul(){
        let a = document.getElementById("a1").value // first number
        let b = document.getElementById("a2").value // operator
        let c = document.getElementById("a3").value //second number
        let d = document.getElementById("my") // innerHTML to be displayed  

        a=Number(a)   
        c= Number(c)
        if (b=="+") {
        d.innerHTML= (a) + (c)
        }

      else if  (b == "-") {
      d.innerHTML= (a) - (c)    
        }
      else if  (b == "/") {
      d.innerHTML= (a) / (c)    
        }
      else if  ( b== "*" ) {
      d.innerHTML= (a) * (c)    
        }
    } 
    </script>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> calculator</title>
    <title>calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
    .parent{
    width: 500px;
    height: 550px;
    background-color: #000000;
    border-radius: 10px;
    color: white;
    margin: auto;
    margin-top: 10px;
    padding: 10px;
}
.child{
    width: 50px;
    height: 50px;
background-color: black;

    border-radius: 10px;
    color: white;
    border: none;
}
.calc{
    width: 50px;
    height: 50px;
    border-radius: 10px;
background-color: black;
    
    border: none;
    color: white;

}
.action{
    width: 120px;
    height: 60px;
    background-color: rgb(0, 255, 55);

    border-radius: 5px;
    padding: 3px;
    border: none;
    color: white;

}
.nbtn{
    display: flex; 
     margin-bottom: 20px; 
    margin-top: 30px;
    justify-content: space-around;
}

.actiondiv{
    display: flex;
    margin-top: 10px;
    justify-content: space-around;

}

:hover.child{
    background-color: rgb(0, 255, 55);
transition: 0.8s;
}
:hover.calc{
    background-color: darkred;
    transition: 0.8s;
  
}
:hover.action{
    background-color: white;
    color: #000000;
    transition: 0.9s;

}

</style>
</head>
<body>
   <div class="parent">
    <input value="" style="color: forestgreen;" disabled   class="form-control " id="inp">
    <div>

    <div class="nbtn">    
     <button type="button" disabled id="numb"  onclick="dis(1)"class="child">1</button>
    <button type="button" disabled id="numb" onclick="dis(2)" class="child">2</button>
    <button type="button"  id="numb" class="child" onclick="dis(3)">3</button>
    <button class="calc" value="+" id="ad" onclick="dis('+')" >+</button>

    </div>

   <div class="nbtn"> 
    <button class="child" id="numb" onclick="dis(4)">4</button>
    <button class="child" id="numb" onclick="dis(5)">5</button>
    <button class="child" id="numb" onclick="dis(6)">6</button>
    <button class="calc" onclick="dis('-')">-</button>

    </div>

   <div class="nbtn">
    <button class="child" id="numb" onclick="dis(7)">7</button>
    <button class="child" id="numb" onclick="dis(8)">8</button>
    <button class="child" id="numb" onclick="dis(9)">9</button>
    <button class="calc" id="numb" onclick="dis('/')">/</button>
    

   </div>

    <div class="nbtn">
    <button class="child"  id="numb" onclick="dis(0)">0</button>
    <button class="child" onclick="dis('.')">.</button>
    <button class="calc" onclick="dis('*')">x</button>
    <button class="calc" onclick="dis('%')">%</button>

    </div>

    <div class="nbtn">
        <button class="child" onclick="dee(1/'s')">1/s</button>
        <button class="child" onclick="root()">&radic;</button>
        <button class="calc" onclick="dis('&and')">&and;</button>
        <button class="calc" id="sw" onclick="sw()">on</button>
    
        </div>
    

    <div class="actiondiv">
    <button class="action"  onclick="solv() ">=</button>
    <button class="action"  onclick="del()">del</button>
    <button class="action"  onclick="clr()">clear</button>
    </div>
    
   </div>
    




</body>
</html>
<script>
    function clr(){
        document.getElementById("inp").value = " "
    }
    function del(){
    let del =  document.getElementById("inp").value 
    let sub = del.slice(0,-1) 
    document.getElementById("inp").value = sub 
}



function dis(num){
 document.getElementById("inp").value += num
}

// function solv(){
//     let x = document.getElementById("inp").value
//     let y = eval(x)
//     document.getElementById("inp").value = y
// }


function dee(){
  let s =  document.getElementById("inp").value
    document.getElementById("inp").value = 1/s
}

function root(){
    let x = document.getElementById("inp").value
    let y = Math.sqrt(x)
    document.getElementById("inp").value = y
}
//const calculator = {displayvalue: 'return' , firstno: null,waitsecondno:false,operator:null }



let enable = true
let swit = true
function sw(){
    if (swit == false){
        document.getElementById("sw").innerHTML="off"

if (enable==false){
    document.getElementById("numb").disabled = false
    enable = true
}

swit = true

}
   else if (swit == true){
        document.getElementById("sw").innerHTML= "on"
        swit = false
        if(enable==true) {
    document.getElementById('numb').disabled = true
    document.getElementById("inp").value=null
}
         enable=false
    }
}
